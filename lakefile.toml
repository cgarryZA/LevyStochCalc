name = "LevyStochCalc"
version = "0.1.0"
keywords = ["math", "stochastic-calculus", "levy-processes"]
defaultTargets = ["LevyStochCalc"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "0e208554a6143756c125878a8fe8b17a331d39f7"

[[lean_lib]]
name = "LevyStochCalc"

# P10 F4 fix (red-team 2nd audit, 2026-05-23): examples library for
# end-to-end public-API usage examples. Compiles separately from the
# main library to keep example breakage from blocking the headline
# build, but is verified by `lake build LevyStochCalcExamples`.
[[lean_lib]]
name = "LevyStochCalcExamples"
srcDir = "examples"
roots = ["ItoLevyIsometryUsage"]
