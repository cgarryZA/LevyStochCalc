name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# P2 MEDIUM-2 fix (red-team 2nd audit 2026-05-23): cancel in-progress runs
# when a new push for the same ref lands. Saves a full Mathlib rebuild on
# rapid-fire pushes to the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # P2 MEDIUM-1 fix (red-team 2nd audit 2026-05-23): cache `~/.elan`
      # in addition to `.lake`. Without this, the Lean toolchain (~200 MB)
      # is re-downloaded on every CI run, burning ~30s of bandwidth/decomp
      # per run for no benefit. Key off `lean-toolchain` so cache invalidates
      # when the toolchain pin changes.
      - name: Cache ~/.elan (Lean toolchain)
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}
          restore-keys: |
            elan-${{ runner.os }}-

      - name: Install elan (Lean toolchain manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lakefile.toml', 'lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Lean version
        run: lean --version

      - name: lake build
        run: lake build

      - name: tools/lint.sh
        run: bash tools/lint.sh
